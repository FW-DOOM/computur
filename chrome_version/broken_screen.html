<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
<style>
* { margin:0; padding:0; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; cursor:none; user-select:none; }
canvas { display:block; position:fixed; top:0; left:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width, H = canvas.height;

function r(a, b)  { return a + Math.random() * (b - a); }
function ri(a, b) { return Math.floor(r(a, b)); }

// ── Audio: glass crack ──
function crackSound() {
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    function tone(freq, type, vol, start, dur) {
      const o = actx.createOscillator(), g = actx.createGain();
      o.connect(g); g.connect(actx.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(0, actx.currentTime + start);
      g.gain.linearRampToValueAtTime(vol, actx.currentTime + start + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + start + dur);
      o.start(actx.currentTime + start);
      o.stop(actx.currentTime + start + dur + 0.05);
    }
    tone(55,  'sine',    0.7, 0,    0.3);
    tone(110, 'square',  0.3, 0,    0.18);
    tone(40,  'sine',    0.3, 0,    1.0);
    for (let i = 0; i < 22; i++) {
      tone(800 + r(0, 2800), 'sawtooth', r(0.05, 0.14), 0.04 + i * 0.06 + r(0,0.03), 0.05);
    }
  } catch(e) {}
}

// ── Impact points ──
const impacts = [
  { x: W * 0.26, y: H * 0.30 },
  { x: W * 0.55, y: H * 0.53 },
  { x: W * 0.74, y: H * 0.62 },
];

// ── 1. Black base ──
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);

// ── 2. LCD color bleed columns ──
// Colors that appear on a real broken LCD
const lcdColors = [
  '#ff0000','#ff0000',
  '#00ff00','#00ff00',
  '#0000ff','#0000ff',
  '#00ffff',
  '#ff00ff',
  '#ffff00',
  '#ff8800',
  '#ffffff','#ffffff',
  '#8800ff',
  '#ff0088',
  '#000000','#000000','#000000', // dead black - frequent
];

// Draw vertical colored strips across the whole screen
let x = 0;
while (x < W) {
  const colW = ri(1, 7);
  const color = lcdColors[ri(0, lcdColors.length)];

  // alpha based on distance to nearest impact — colors show most near damage
  let minDist = Infinity;
  impacts.forEach(imp => {
    const d = Math.sqrt((x - imp.x) ** 2 + (H/2 - imp.y) ** 2);
    if (d < minDist) minDist = d;
  });
  const maxR = Math.max(W, H) * 0.85;
  const alpha = Math.max(0.05, 1.0 - (minDist / maxR) * 0.6);

  ctx.fillStyle = color === '#000000'
    ? `rgba(0,0,0,${Math.min(1, alpha * 1.4)})`
    : hexToRgba(color, alpha);
  ctx.fillRect(x, 0, colW, H);
  x += colW;
}

// ── 3. Horizontal overexposed bands (white/blue glow) ──
for (let i = 0; i < ri(4, 8); i++) {
  const by  = ri(0, H);
  const bh  = ri(15, 90);
  const col = Math.random() < 0.6 ? '200,230,255' : '255,255,255';
  const gr  = ctx.createLinearGradient(0, by, 0, by + bh);
  gr.addColorStop(0,   `rgba(${col},0)`);
  gr.addColorStop(0.3, `rgba(${col},${r(0.3,0.7)})`);
  gr.addColorStop(0.7, `rgba(${col},${r(0.3,0.7)})`);
  gr.addColorStop(1,   `rgba(${col},0)`);
  ctx.fillStyle = gr;
  ctx.fillRect(0, by, W, bh);
}

// ── 4. Dark dead zones near each impact (blot out LCD behind crack centers) ──
impacts.forEach(imp => {
  const gr = ctx.createRadialGradient(imp.x, imp.y, 0, imp.x, imp.y, ri(90, 160));
  gr.addColorStop(0,   'rgba(0,0,0,0.85)');
  gr.addColorStop(0.5, 'rgba(0,0,0,0.4)');
  gr.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, 0, W, H);
});

// ── 5. Crack lines (recursive) ──
const segments = [];
let maxT = 0;

function buildCrack(x, y, len, angle, depth, t) {
  if (depth === 0 || len < 4) return;
  const rad = angle * Math.PI / 180;
  const x2 = x + Math.cos(rad) * len + r(-3,3);
  const y2 = y + Math.sin(rad) * len + r(-3,3);
  const endT = t + r(0.04, 0.09);
  maxT = Math.max(maxT, endT);
  segments.push({ x1:x, y1:y, x2, y2, depth });
  buildCrack(x2, y2, len*r(0.55,0.82), angle+r(-14,14), depth-1, endT);
  const nb = depth > 3 ? ri(1,3) : ri(0,2);
  for (let i=0;i<nb;i++)
    buildCrack(x2, y2, len*r(0.28,0.62), angle+r(-65,65), depth-2, endT+r(0,0.05));
}

impacts.forEach((imp, gi) => {
  const arms = ri(11,16);
  for (let i=0;i<arms;i++) {
    const angle = (360/arms)*i + r(-12,12);
    buildCrack(imp.x, imp.y, ri(110,280), angle, ri(7,10), gi*0.15 + r(0,0.04));
  }
});

// draw all segments
segments.forEach(seg => {
  const da = Math.min(1, seg.depth / 7);
  const lw = Math.max(0.4, (seg.depth / 8) * 2.5);

  // glow
  ctx.strokeStyle = `rgba(180,220,255,${da*0.15})`;
  ctx.lineWidth = lw + 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(seg.x1,seg.y1); ctx.lineTo(seg.x2,seg.y2); ctx.stroke();

  // red CA
  ctx.strokeStyle = `rgba(255,50,50,${da*0.4})`;
  ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(seg.x1+1.8,seg.y1+0.5); ctx.lineTo(seg.x2+1.8,seg.y2+0.5); ctx.stroke();

  // blue CA
  ctx.strokeStyle = `rgba(50,100,255,${da*0.4})`;
  ctx.beginPath(); ctx.moveTo(seg.x1-1.8,seg.y1-0.5); ctx.lineTo(seg.x2-1.8,seg.y2-0.5); ctx.stroke();

  // white core
  ctx.strokeStyle = `rgba(255,255,255,${da*0.92})`;
  ctx.lineWidth = Math.max(0.3, lw - 0.6);
  ctx.beginPath(); ctx.moveTo(seg.x1,seg.y1); ctx.lineTo(seg.x2,seg.y2); ctx.stroke();
});

// ── 6. Impact rings ──
impacts.forEach(imp => {
  [[ri(8,18),2,0.9],[ri(22,36),1,0.55],[ri(40,58),0.5,0.25]].forEach(([rad,lw,a]) => {
    ctx.strokeStyle = `rgba(255,255,255,${a})`;
    ctx.lineWidth = lw;
    ctx.beginPath(); ctx.arc(imp.x,imp.y,rad,0,Math.PI*2); ctx.stroke();
  });
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath(); ctx.arc(imp.x,imp.y,4,0,Math.PI*2); ctx.fill();
});

// ── 7. Glass fragment dots ──
for (let i=0;i<2200;i++) {
  const px=r(0,W), py=r(0,H), rad=r(0.4,2.2), a=r(0.15,0.75);
  ctx.fillStyle=`rgba(255,255,255,${a})`;
  ctx.beginPath(); ctx.arc(px,py,rad,0,Math.PI*2); ctx.fill();
}

// ── 8. Vignette (darken edges) ──
const vg = ctx.createRadialGradient(W/2,H/2,H*0.3, W/2,H/2,H*0.85);
vg.addColorStop(0,'rgba(0,0,0,0)');
vg.addColorStop(1,'rgba(0,0,0,0.55)');
ctx.fillStyle = vg;
ctx.fillRect(0,0,W,H);

// ── helper ──
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Play sound + fullscreen on first interaction ──
let started = false;
function start() {
  if (started) return; started = true;
  crackSound();
  document.documentElement.requestFullscreen && document.documentElement.requestFullscreen().catch(()=>{});
}
document.addEventListener('click',    start, { once:true });
document.addEventListener('keydown',  start, { once:true });
document.addEventListener('touchstart', start, { once:true });
// auto-attempt fullscreen immediately too
setTimeout(() => {
  document.documentElement.requestFullscreen && document.documentElement.requestFullscreen().catch(()=>{});
}, 200);

// ── Block everything ──
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  // block F5, F11, Ctrl+W/R/T etc
  if (['F5','F11','Escape'].includes(e.key) ||
     (e.ctrlKey && ['w','r','t','n','l','u'].includes(e.key.toLowerCase()))) {
    e.preventDefault();
  }
});
// re-enter fullscreen if they escape it
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    setTimeout(() => document.documentElement.requestFullscreen().catch(()=>{}), 300);
  }
});

// ── Secret exit: type 4308 ──
let buf = '';
document.addEventListener('keydown', e => {
  buf += e.key; if (buf.length > 4) buf = buf.slice(-4);
  if (buf === '4308') {
    document.exitFullscreen && document.exitFullscreen();
    window.close();
  }
});
</script>
</body>
</html>
