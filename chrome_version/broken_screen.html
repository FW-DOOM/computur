<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
<style>
* { margin:0; padding:0; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width, H = canvas.height;

// dark background
ctx.fillStyle = '#0a0500';
ctx.fillRect(0, 0, W, H);

function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b)); }

// ── crack lines ──
function crack(x, y, length, angle, depth, thickness) {
  if (depth === 0 || length < 3) return;
  const rad = angle * Math.PI / 180;
  const wx = rand(-4, 4), wy = rand(-4, 4);
  const x2 = x + Math.cos(rad) * length + wx;
  const y2 = y + Math.sin(rad) * length + wy;
  const alpha = Math.min(1, depth / 6);
  ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
  ctx.lineWidth   = Math.max(0.5, thickness);
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  // main branch continues
  crack(x2, y2, length * rand(0.55, 0.82), angle + rand(-15, 15), depth - 1, thickness - 0.35);
  // side branches
  const nb = depth > 3 ? randInt(0, 3) : randInt(0, 2);
  for (let i = 0; i < nb; i++) {
    crack(x2, y2, length * rand(0.3, 0.65), angle + rand(-70, 70), depth - 2, thickness - 0.7);
  }
}

function addImpact(ix, iy, arms, thickness) {
  // rings
  [randInt(10,22), randInt(26,45)].forEach((r, i) => {
    ctx.strokeStyle = i === 0 ? 'rgba(255,255,255,0.9)' : 'rgba(180,180,180,0.5)';
    ctx.lineWidth = i === 0 ? 2 : 1;
    ctx.beginPath();
    ctx.arc(ix, iy, r, 0, Math.PI * 2);
    ctx.stroke();
  });
  for (let i = 0; i < arms; i++) {
    const angle = (360 / arms) * i + rand(-10, 10);
    crack(ix, iy, randInt(120, 320), angle, randInt(7, 10), thickness);
  }
}

// 3 impact points
const impacts = [
  [W * 0.28, H * 0.30],
  [W * 0.55, H * 0.52],
  [W * 0.74, H * 0.60],
];
impacts.forEach(([ix, iy]) => addImpact(ix, iy, randInt(10, 16), rand(2, 4)));

// scattered glass dots
for (let i = 0; i < 2000; i++) {
  const px = rand(0, W), py = rand(0, H);
  const r  = rand(0.5, 2.5);
  const a  = rand(0.2, 0.8);
  ctx.fillStyle = `rgba(255,255,255,${a})`;
  ctx.beginPath();
  ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fill();
}

// request fullscreen
document.documentElement.requestFullscreen && document.documentElement.requestFullscreen().catch(()=>{});
document.addEventListener('contextmenu', e => e.preventDefault());

// secret exit: type 4308
let buf = '';
document.addEventListener('keydown', e => {
  buf += e.key; if (buf.length > 4) buf = buf.slice(-4);
  if (buf === '4308') { document.exitFullscreen && document.exitFullscreen(); window.close(); }
});
</script>
</body>
</html>
