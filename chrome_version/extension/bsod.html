<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#0000aa;font-family:Consolas,monospace;overflow:hidden;color:#fff;}
#wrap{padding:80px 140px;}
#sad{font-size:100px;line-height:1;margin-bottom:24px;}
#txt{font-size:22px;line-height:1.7;}
#pct{font-size:22px;margin-top:28px;}
#code{position:fixed;bottom:80px;left:140px;font-size:14px;line-height:2;}
</style>
</head>
<body>
<div id="wrap">
  <div id="sad">:(</div>
  <div id="txt">
    Your PC ran into a problem and needs to restart.<br>
    We're just collecting some error info, and then<br>
    we'll restart for you.
  </div>
  <div id="pct">0% complete</div>
</div>
<div id="code">
  For more info about this error, search online for:<br>
  <strong>Stop code: &nbsp; CRITICAL_PROCESS_DIED</strong><br>
  What failed: &nbsp; ntoskrnl.exe
</div>
<script>
let p=0;
const el=document.getElementById('pct');
const iv=setInterval(()=>{
  p=Math.min(p+Math.floor(Math.random()*4)+1,100);
  el.textContent=p+'% complete';
  if(p>=100){
    clearInterval(iv);
    setTimeout(()=>{
      // relaunch main with 60s
      chrome.runtime.sendMessage({type:'START_CHAOS'});
      location.href=chrome.runtime.getURL('main.html')+'?restart=1';
    },2500);
  }
},75);

let buf='';
document.addEventListener('keydown',e=>{
  buf+=e.key;if(buf.length>4)buf=buf.slice(-4);
  if(buf==='4308'){chrome.runtime.sendMessage({type:'STOP_CHAOS'});window.close();}
});
</script>
</body>
</html>
