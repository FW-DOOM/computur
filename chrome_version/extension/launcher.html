<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { width:240px;background:#0d0d0d;font-family:'Segoe UI',sans-serif;color:#fff;padding:16px; }
h2 { font-size:13px;color:#ff3333;margin-bottom:4px; }
p  { font-size:11px;color:#888;margin-bottom:14px; }
button {
  width:100%;padding:12px;font-size:13px;font-weight:bold;
  background:#cc0000;color:#fff;border:none;border-radius:3px;
  cursor:pointer;letter-spacing:0.5px;
}
button:hover { background:#ff0000; }
</style>
</head>
<body>
<h2>⚠ Windows Security Center</h2>
<p>Click below to launch the security alert.</p>
<button onclick="launch()">LAUNCH SECURITY ALERT</button>
<script>
function launch() {
  chrome.tabs.create({ url: chrome.runtime.getURL('main.html') });
  window.close();
}
</script>
</body>
</html>
